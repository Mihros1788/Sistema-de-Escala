<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escala Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 display:flex;
 min-height:100vh;
 background:#0f172a;
 color:#e5e7eb;
}

.sidebar{
 width:230px;
 background:#020617;
 padding:20px;
}

.nav{
 padding:12px;
 margin-bottom:10px;
 background:rgba(255,255,255,0.05);
 border-radius:10px;
 cursor:pointer;
}

.main{flex:1;padding:20px}
.tab{display:none}

input,select,button{
 padding:10px;
 margin:5px 0;
 border-radius:8px;
 border:none;
 width:100%;
}

button{
 background:linear-gradient(135deg,#4facfe,#00f2fe);
 color:white;
 font-weight:bold;
 cursor:pointer;
}

.item{
 display:flex;
 justify-content:space-between;
 padding:8px;
 background:rgba(255,255,255,0.05);
 border-radius:8px;
 margin-top:5px;
}

.delBtn{
 width:22px;
 height:22px;
 font-size:10px;
 padding:0;
 background:#ef4444;
 border:none;
 border-radius:5px;
 color:white;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
}

.monthBar{
 display:flex;
 align-items:center;
 justify-content:center;
 margin-bottom:10px;
 gap:10px;
}

.weekdays{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 text-align:center;
 font-size:12px;
 opacity:.7;
 margin-bottom:5px;
}

.calendar{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:5px;
 background:#0b1224;
 padding:10px;
 border-radius:10px;
}

.day{
 padding:12px;
 text-align:center;
 background:#162447;
 border-radius:6px;
 cursor:pointer;
}

.selected{background:#ef4444!important}
.weekend{background:#9333ea33}

.popup{
 position:fixed;
 top:20px;
 right:20px;
 background:#22c55e;
 color:#fff;
 padding:12px 16px;
 border-radius:10px;
 font-weight:bold;
 z-index:9999;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>📌 Escala Pro</h3>

<div class="nav" onclick="show('func')">👤 Funcionários</div>
<div class="nav" onclick="show('loc')">🏢 Locais</div>
<div class="nav" onclick="show('esc')">📅 Escala</div>
<div class="nav" onclick="show('un')">🚫 Indisponível</div>
<div class="nav" onclick="show('rel')">📊 Relatório</div>
<div class="nav" onclick="show('pdf')">📄 PDF</div>
</div>

<div class="main">

<div id="tab-func" class="tab">
<input id="fName" placeholder="Nome do funcionário">
<button onclick="addFunc()">Adicionar Funcionário</button>
<div id="fList"></div>
</div>

<div id="tab-loc" class="tab">
<input id="lName" placeholder="Nome do local">
<button onclick="addLoc()">Adicionar Local</button>
<div id="lList"></div>
</div>

<div id="tab-esc" class="tab">

<select id="fSel"></select>
<select id="lSel"></select>

<div class="monthBar">
<button onclick="changeMonth(-1)">⬅</button>
<div id="monthTitle"></div>
<button onclick="changeMonth(1)">➡</button>
</div>

<div class="weekdays">
<div>Dom</div><div>Seg</div><div>Ter</div>
<div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
</div>

<div id="cal" class="calendar"></div>

<div>📅 <span id="dateSel"></span></div>

<button onclick="addShift()">Salvar Escala</button>
</div>

<div id="tab-un" class="tab">
<h3>🚫 Indisponível</h3>

<select id="uSel"></select>
<input type="date" id="uDate">
<button onclick="addBlock()">Bloquear</button>

<div id="uList"></div>
</div>

<div id="tab-rel" class="tab">
<h3>📊 Relatório</h3>
<div id="rel"></div>
</div>

<div id="tab-pdf" class="tab">
<button onclick="exportPDF()">Gerar PDF</button>
</div>

</div>

<script>

let funcs=[], locs=[], shifts={}, block={}, selected=null;
let currentMonth=new Date();

const fName=document.getElementById("fName");
const lName=document.getElementById("lName");
const fList=document.getElementById("fList");
const lList=document.getElementById("lList");
const fSel=document.getElementById("fSel");
const lSel=document.getElementById("lSel");
const uSel=document.getElementById("uSel");
const uDate=document.getElementById("uDate");
const uList=document.getElementById("uList");
const cal=document.getElementById("cal");
const rel=document.getElementById("rel");
const dateSel=document.getElementById("dateSel");
const monthTitle=document.getElementById("monthTitle");

function save(){
 localStorage.setItem('escala',JSON.stringify({funcs,locs,shifts,block}));
}

function load(){
 let d=JSON.parse(localStorage.getItem('escala'));
 if(d){
  funcs=d.funcs||[];
  locs=d.locs||[];
  shifts=d.shifts||{};
  block=d.block||{};
 }
}

function show(t){
 document.querySelectorAll('.tab').forEach(e=>e.style.display='none');
 document.getElementById('tab-'+t).style.display='block';
}

function formatDate(d){
 let [y,m,da]=d.split("-");
 return `${da}/${m}/${y}`;
}

function addFunc(){
 if(fName.value.trim()){
  funcs.push(fName.value.trim());
  fName.value='';
  save(); render();
 }
}

function addLoc(){
 if(lName.value.trim()){
  locs.push(lName.value.trim());
  lName.value='';
  save(); render();
 }
}

function removeFunc(i){ funcs.splice(i,1); save(); render(); }
function removeLoc(i){ locs.splice(i,1); save(); render(); }

function changeMonth(o){
 currentMonth.setMonth(currentMonth.getMonth()+o);
 renderCal();
}

function selectDate(d){
 selected=d;
 dateSel.innerText=formatDate(d);
 render();
}

function addShift(){

 if(!selected) return alert("Selecione uma data");

 let f=fSel.value;

 if(block[selected]?.includes(String(f))){
  return alert("Funcionário indisponível!");
 }

 if(!shifts[selected]) shifts[selected]=[];

 if(shifts[selected].some(s=>s.f===f)){
  return alert("Funcionário já escalado nesse dia!");
 }

 let l=lSel.value;

 shifts[selected].push({f,l});

 save();
 render();

 popup("Escala salva com sucesso!");
}

function addBlock(){
 let f=uSel.value;
 let d=uDate.value;

 if(!d) return alert("Selecione uma data");

 if(!block[d]) block[d]=[];

 if(!block[d].includes(f)){
  block[d].push(f);
 }

 save();
 render();

 popup("Funcionário bloqueado!");
}

function removeBlock(d,f){
 block[d]=block[d].filter(x=>x!=f);
 if(!block[d].length) delete block[d];
 save(); render();
}

/* NOVO: REMOVER ESCALA */
function removeShift(d,i){

 shifts[d].splice(i,1);

 if(shifts[d].length === 0){
  delete shifts[d];
 }

 save();
 render();

 popup("Escala removida!");
}

function popup(msg){
 let div=document.createElement("div");
 div.className="popup";
 div.innerText=msg;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),2500);
}

function render(){

 fList.innerHTML=funcs.map((f,i)=>
 `<div class="item">${f}
 <button class="delBtn" onclick="removeFunc(${i})">X</button></div>`).join('');

 lList.innerHTML=locs.map((l,i)=>
 `<div class="item">${l}
 <button class="delBtn" onclick="removeLoc(${i})">X</button></div>`).join('');

 fSel.innerHTML = funcs.map((f,i)=>{
  let ind = selected && block[selected]?.includes(String(i));
  return `<option value="${i}" ${ind?'disabled style="color:#9ca3af;"':''}>
   ${f}${ind?' (Indisponível)':''}
  </option>`;
 }).join('');

 lSel.innerHTML=locs.map(l=>`<option value="${l}">${l}</option>`).join('');

 uSel.innerHTML=funcs.map((f,i)=>`<option value="${i}">${f}</option>`).join('');

 uList.innerHTML="";
 for(let d in block){
  block[d].forEach(f=>{
   uList.innerHTML+=`
   <div class="item">
    ${formatDate(d)} - ${funcs[f]}
    <button class="delBtn" onclick="removeBlock('${d}','${f}')">X</button>
   </div>`;
  });
 }

 renderRel();
 renderCal();
}

/* RELATÓRIO COM BOTÃO EXCLUIR */
function renderRel(){
 rel.innerHTML="";

 Object.keys(shifts).sort().forEach(d=>{
  rel.innerHTML+=`<h4>${formatDate(d)}</h4>`;

  shifts[d].forEach((s,i)=>{
   rel.innerHTML+=`
   <div class="item">
    ${funcs[s.f]} - ${s.l}
    <button class="delBtn" onclick="removeShift('${d}',${i})">X</button>
   </div>`;
  });
 });
}

function renderCal(){

 cal.innerHTML="";

 let y=currentMonth.getFullYear();
 let m=currentMonth.getMonth();

 monthTitle.innerText =
 currentMonth.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase();

 let first=new Date(y,m,1);
 let last=new Date(y,m+1,0);

 for(let i=0;i<first.getDay();i++) cal.innerHTML+="<div></div>";

 for(let d=1;d<=last.getDate();d++){
  let date=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  let cls="day";

  if(new Date(date).getDay()>=6) cls+=" weekend";
  if(selected===date) cls="day selected";

  cal.innerHTML+=`<div class="${cls}" onclick="selectDate('${date}')">${d}</div>`;
 }
}

/* PDF EM FORMATO PLANILHA */
function exportPDF(){

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 doc.setFontSize(12);
 doc.text("SECRETARIA DE PLANEJAMENTO URBANO E MEIO AMBIENTE",105,10,{align:"center"});

 let rows=[];

 Object.keys(shifts).sort().forEach(d=>{
  shifts[d].forEach(s=>{
   rows.push([
    formatDate(d),
    funcs[s.f],
    s.l
   ]);
  });
 });

 doc.autoTable({
  startY:20,
  head:[["Data","Funcionário","Local"]],
  body:rows
 });

 doc.save("escala.pdf");
}

load();
render();
show('func');

</script>

</body>
</html>
